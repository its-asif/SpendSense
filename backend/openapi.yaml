openapi: 3.0.3
info:
  title: SpendSense API
  version: "1.0.0"
  description: API for SpendSense Phase 1 (expenses, incomes, wallets, categories, auth)
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created

  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Auth tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/refresh:
    post:
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/logout:
    post:
      summary: Logout (revoke single refresh token)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: OK

  /auth/logout-all:
    post:
      summary: Logout from all sessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  /ops/refresh-tokens/cleanup:
    post:
      summary: Trigger refresh token cleanup
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cleanup result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer

  /api/v1/expenses:
    post:
      summary: Create expense
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseRequest'
      responses:
        '201':
          description: Created

    get:
      summary: List expenses (cursor pagination)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          description: List

  /api/v1/expenses/{id}:
    get:
      summary: Get expense by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: expense

    put:
      summary: Update expense
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExpenseRequest'
      responses:
        '200':
          description: Updated

    delete:
      summary: Soft-delete expense
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted

  /api/v1/categories:
    post:
      summary: Create category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '201':
          description: Created

    get:
      summary: List categories
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  /api/v1/wallets:
    post:
      summary: Create wallet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWalletRequest'
      responses:
        '201':
          description: Created

    get:
      summary: List wallets
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  /api/v1/incomes:
    post:
      summary: Create income
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIncomeRequest'
      responses:
        '201':
          description: Created

    get:
      summary: List incomes
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          description: OK

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
    RefreshRequest:
      type: object
      required: [email, refresh_token]
      properties:
        email:
          type: string
        refresh_token:
          type: string
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    CreateExpenseRequest:
      type: object
      required: [wallet_id, amount, currency, date]
      properties:
        wallet_id:
          type: integer
        amount:
          type: string
        currency:
          type: string
        category_id:
          type: integer
        date:
          type: string
          format: date
        merchant:
          type: string
        notes:
          type: string
    UpdateExpenseRequest:
      type: object
      properties:
        merchant:
          type: string
        notes:
          type: string
    CategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        is_system:
          type: boolean
    CreateWalletRequest:
      type: object
      required: [name, wallet_type, opening_balance, currency]
      properties:
        name:
          type: string
        wallet_type:
          type: string
          enum: [CASH, MOBILE_WALLET, BANK, CARD]
        provider:
          type: string
          nullable: true
        opening_balance:
          type: string
        currency:
          type: string
    CreateIncomeRequest:
      type: object
      required: [wallet_id, source_name, amount, currency, income_date]
      properties:
        wallet_id:
          type: integer
        category_id:
          type: integer
          nullable: true
        source_name:
          type: string
        amount:
          type: string
        currency:
          type: string
        income_date:
          type: string
          format: date
        notes:
          type: string
